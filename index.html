<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICT 멘토링 · 수도권 ICT이노베이션스퀘어</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --brand:#1a73e8;--brand-600:#1966c9;--brand-700:#1557a5;--brand-50:#e8f0fe;--brand-100:#d2e3fc;--brand-200:#aecbfa;
  --ink-900:#202124;--ink-800:#3c4043;--ink-700:#5f6368;--ink-600:#80868b;--ink-500:#9aa0a6;--ink-400:#bdc1c6;--ink-300:#dadce0;--ink-150:#e8eaed;--ink-100:#f1f3f4;
  --line:#e3e5e8;--line-strong:#c4c7c5;--bg-canvas:#f8f9fa;
  --danger-500:#d93025;--danger-700:#b3261e;--danger-50:#fce8e6;
  --ok-500:#1e8e3e;--ok-700:#137333;--ok-50:#e6f4ea;
  --warn-50:#fef7e0;--warn-700:#b06000;
  --r:8px;--r-sm:6px;--r-md:12px;--r-pill:999px;
  --el-1:0 1px 2px rgba(60,64,67,.1);--el-2:0 2px 8px rgba(60,64,67,.15);
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  --font-display:var(--font-body);--font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);color:var(--ink-900);background:var(--bg-canvas)}
input,textarea,select{font-family:var(--font-body)}
button{font-family:var(--font-display)}
a{color:var(--brand)}
@keyframes popin{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.field{display:flex;flex-direction:column;gap:6px}
.field span.lbl{font-size:13px;font-weight:500;color:var(--ink-800)}
.field .req{color:var(--danger-500)}
.inp{height:46px;padding:0 14px;border:1px solid var(--line-strong);border-radius:var(--r);font-size:15px;outline:none;background:#fff;width:100%}
.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100)}
textarea.inp{height:auto;padding:11px 14px;line-height:1.5;resize:vertical}
.btn{height:46px;padding:0 22px;border:none;border-radius:var(--r-pill);color:#fff;background:var(--brand);font-weight:600;font-size:15px;cursor:pointer}
.btn:hover{background:var(--brand-600)}
.btn:disabled{background:var(--ink-300);cursor:not-allowed}
.btn-ghost{background:#fff;color:var(--ink-800);border:1px solid var(--line-strong)}
.btn-ghost:hover{background:var(--ink-100)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--el-1)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border-radius:var(--r-pill);padding:3px 10px;width:fit-content}
.b-confirm{color:var(--brand-700);background:var(--brand-50)}
.b-done{color:var(--ink-700);background:var(--ink-150)}
.b-cancel{color:var(--danger-700);background:var(--danger-50)}
.b-ok{color:var(--ok-700);background:var(--ok-50)}
.chip{font-size:11.5px;font-weight:500;color:var(--ink-700);background:var(--ink-150);border-radius:var(--r-pill);padding:3px 10px}
.hidden{display:none!important}
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink-900);color:#fff;padding:12px 20px;border-radius:var(--r-pill);font-size:14px;box-shadow:var(--el-2);opacity:0;transition:opacity .25s;pointer-events:none;z-index:100}
#toast.show{opacity:1}
</style>
</head>

function avatarHtml(m, size){

}
function readPhoto(file, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{ try{ const S=220; const c=document.createElement('canvas'); c.width=S;c.height=S; const ctx=c.getContext('2d'); const scale=Math.max(S/img.width,S/img.height); const w=img.width*scale,h=img.height*scale; ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h); cb(c.toDataURL('image/jpeg',0.85)); }catch(e){ cb(r.result); } }; img.src=r.result; };
  r.readAsDataURL(file);
}
function weekNav(){

    <span style="font-size:13px;font-weight:600;color:var(--ink-800)">${w+1}주차</span>

  </div>`;
}
function weeklyGrid(m, wk, mode){
  const av = mode==='edit' ? (state.availDraft||new Set()) : null;
  const cols = wk.map(()=>'<col>').join('');
  const head = wk.map(([d,dw])=>`<th style="padding:8px 3px;font-size:11.5px;color:var(--ink-600);font-weight:600;text-align:center">${dw}<br><span style="font-size:13px;color:var(--ink-900)">${d}</span></th>`).join('');
  const rows = HOURS.map(h=>{
    const cells = wk.map(([d,dw])=>{
      if(!IN_PERIOD(d)) return `<td style="padding:2px"><div style="height:32px;border-radius:6px;background:var(--ink-100)"></div></td>`;
      const occ = hourOccupied(m.id,d,h);
      if(mode==='book'){
        const inAvail = mentorAvailSet(m).has(d+'|'+h);
        const isStart = state.slot && state.slot.date===d && state.slot.time===h;
        const isSecond = state.slot && state.slot.date===d && nextHour(state.slot.time)===h;
        const ok = canStart(m,d,h);
        let st, txt, attr='';
        if(isStart||isSecond){ st='background:var(--brand);color:#fff;cursor:pointer'; txt='선택'; attr= isStart?`data-slot="${d}|${h}"`:''; }
        else if(ok){ st='background:#fff;border:1px solid var(--brand-200);color:var(--brand-700);cursor:pointer'; txt='예약 가능'; attr=`data-slot="${d}|${h}"`; }
        else if(occ){ st='background:var(--ink-100);color:var(--ink-400);cursor:pointer'; txt='예약 불가'; attr='data-err="booked"'; }
        else if(inAvail){ st='background:var(--ink-100);color:var(--ink-400);cursor:pointer'; txt='예약 불가'; attr='data-err="leftover"'; }
        else { st='background:var(--ink-100);color:var(--ink-300);cursor:not-allowed'; txt='예약 불가'; }
        return `<td style="padding:2px"><button ${attr} style="width:100%;height:32px;border:none;border-radius:6px;font-size:10.5px;font-weight:500;white-space:nowrap;overflow:hidden;${st}">${txt}</button></td>`;
      } else {
        const on = av.has(d+'|'+h);
        let st, txt='', attr=occ?'':`data-avail="${d}|${h}"`;
        if(occ){ st='background:var(--ink-150);color:var(--ink-500);cursor:not-allowed'; txt='예약'; }
        else if(on){ st='background:var(--brand-50);border:1px solid var(--brand-200);color:var(--brand-700);cursor:pointer'; txt='가능'; }
        else { st='background:#fff;border:1px dashed var(--ink-300);color:var(--ink-400);cursor:pointer'; }
        return `<td style="padding:2px"><button ${attr} style="width:100%;height:32px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap;${st}">${txt}</button></td>`;
      }
    }).join('');
    return `<tr><td style="padding:2px 8px 2px 0;font-size:11px;color:var(--ink-600);white-space:nowrap;text-align:right">${h}</td>${cells}</tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table style="width:100%;table-layout:fixed;border-collapse:collapse"><colgroup><col style="width:46px">${cols}</colgroup><thead><tr><th></th>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ── 멘토: 가능시간 ── */
function getMyMentor(){
  const s=state.session; if(!s) return null;
  const byEmail = state.mentors.find(m=>m.email && String(m.email).toLowerCase()===String(s.email).toLowerCase());
  if(byEmail) return byEmail;
  return state.mentors.find(m=>m.name===s.name) || null;
}
function mentorDraft(){
  const m=getMyMentor(); if(m) return m;
  const s=state.session;
  return {id:null, name:s.name, email:s.email, initials:(s.name||'').trim().slice(0,2), color:'#2563eb', field:'', org:'', tags:[], areas:[], intro:'', about:'', days:[], avail:[]};
}
async function nextMentorId(){
  const ids=state.mentors.map(m=>parseInt(m.id,10)).filter(n=>!isNaN(n));
  return (ids.length?Math.max(...ids):0)+1;
}

async function saveAvail(){
  const m=mentorDraft(); const availArr=[...(state.availDraft||new Set())];
  try{
    if(m.id){ await store.updateMentor(m.id, {avail:availArr, email:m.email||state.session.email}); }
    else { const nid=await nextMentorId(); await store.addMentor({ id:nid, name:m.name, email:state.session.email, initials:m.initials, color:m.color, field:m.field||'', org:m.org||'', tags:m.tags||[], areas:m.areas||[], intro:m.intro||'', about:m.about||'', days:[], avail:availArr }); }
    toast('가능 시간이 저장되었습니다.');
  }catch(e){ toast('저장 오류: '+(e.message||e)); return; }
  state.availDraft=null; await reload();
}
async function saveProfile(){
  const g=(id)=>$('#'+id)?$('#'+id).value.trim():'';
  const nm=g('pf_name')||state.session.name;
  const m=getMyMentor();
  const photo = state.photoDraft!==null ? state.photoDraft : ((m&&m.photo)||null);
  const patch={ name:nm, org:g('pf_org'), field:g('pf_field'),
    tags:g('pf_tags').split(',').map(x=>x.trim()).filter(Boolean),
    about:g('pf_about'), initials:nm.slice(0,2), email:state.session.email, photo };
  try{
    if(m){ await store.updateMentor(m.id, patch); }
    else { const nid=await nextMentorId(); await store.addMentor({ id:nid, color:'#2563eb', days:[], avail:[], intro:'', areas:[], ...patch }); }
    toast('프로필이 저장되었습니다.');
  }catch(e){ const el=$('#pf_msg'); if(el) el.innerHTML=err('저장 오류: '+(e.message||e)); return; }
  state.photoDraft=null; await reload();
}

function bindShell(){
  const app=$('#app');
  app.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{ go(b.dataset.nav); }));
  app.querySelectorAll('[data-logout]').forEach(b=>b.addEventListener('click',logout));
  app.querySelectorAll('[data-open]').forEach(b=>b.addEventListener('click',()=>{ state.mentorId=b.dataset.open; state.slot=null; go('detail'); }));
  app.querySelectorAll('[data-slot]').forEach(b=>b.addEventListener('click',()=>{ const [d,t]=b.dataset.slot.split('|'); if(state.slot&&state.slot.date===d&&state.slot.time===t){ state.slot=null; } else { state.slot={date:d,time:t}; } render(); }));
  app.querySelectorAll('[data-err]').forEach(b=>b.addEventListener('click',()=>{ toast(b.dataset.err==='booked'?'이미 예약된 시간입니다.':'인접한 1시간이 마감되어 2시간 연속 예약이 불가합니다.'); }));
  app.querySelectorAll('[data-week]').forEach(b=>b.addEventListener('click',()=>{ if(b.hasAttribute('disabled'))return; state.week = b.dataset.week==='next'?Math.min(2,state.week+1):Math.max(0,state.week-1); render(); }));
  app.querySelectorAll('[data-avail]').forEach(b=>b.addEventListener('click',()=>{ const k=b.dataset.avail; if(!state.availDraft) state.availDraft=new Set(); if(state.availDraft.has(k)) state.availDraft.delete(k); else state.availDraft.add(k); render(); }));
  const avs=$('#av_save'); if(avs) avs.addEventListener('click',saveAvail);
  const pfs=$('#pf_save'); if(pfs) pfs.addEventListener('click',saveProfile);
  const pfp=$('#pf_photo'); if(pfp) pfp.addEventListener('change',(e)=>{ const fl=e.target.files&&e.target.files[0]; if(!fl)return; readPhoto(fl,(uri)=>{ state.photoDraft=uri; render(); }); });
  app.querySelectorAll('[data-goto="book"]').forEach(b=>b.addEventListener('click',()=>{ if(state.role!=='student'||menteeBlocked())return; go('book'); }));
  const fs=$('#f_submit'); if(fs) fs.addEventListener('click',doBooking);
  const bp=$('#f_phone'); if(bp) bp.addEventListener('input',()=>{ bp.value=formatPhone(bp.value); });
  app.querySelectorAll('[data-cancel]').forEach(b=>b.addEventListener('click',async()=>{ if(!confirm('예약을 취소하시겠습니까?'))return; try{ await store.cancelBooking(b.dataset.cancel); toast('예약이 취소되었습니다.'); }catch(e){ toast('취소 오류: '+(e.message||e)); } await reload(); }));
}
function go(v){ state.view=v; state.week=0; if(v!=='mavail') state.availDraft=null; if(v!=='mprofile') state.photoDraft=null; if(v==='list'){ state.slot=null; state.mentorId=null; } render(); }
function logout(){ state.session=null; localStorage.removeItem('ict_session'); state.gateView='login'; state.prefill={name:'',phone:'',email:''}; state.view='list'; state.slot=null; state.mentorId=null; render(); }

/* ═══════════ 시작 ═══════════ */
reload();
</script>
